name: CI Smoke Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-guardrails:
    name: Smoke guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI smoke guardrails
        run: npm run ci:smoke
